name ci-cd pipeline

on:
  push:
     branches:
        -main

jobs
  build-scan-push-deploy
    runs-on:ubuntu latest

     steps:
         -name: checkout code
           uses : actions/checkout@v4

          -name: Build Docker  Image
            run: docker build -t mock-ekyc-api

          -name: Mock Security Scan
            run: echo echo "Running in TrivyScan"

           -name: Login to Registry
             run: echo "${{secrets.DCOKER_PASSWORD"}}" | docker login-u "${{secret.Docker_USERNAME}}" --password-stdin

            -name: Tag Image
             run: docker push username/mock-ekyc-api:latest

            -name: Push Image
              run: docker push username/mock-ekyc-api:latest

           -name: Configure Kubeconfig
             run: echo"${{ secerts.KUBECONFIG }}" >  kubeconfig

           -name: Deploy to kubernetes
              run: kubectl --kubeconfig=kubeconfig set image deployment/mock-ekyc mock-ekyc=username/mock-ekyc-api:latest -n startup-namespace
